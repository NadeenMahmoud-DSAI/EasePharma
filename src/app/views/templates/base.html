<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EasePharma - {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
  <header class="py-3 bg-white border-bottom">
    <div class="container d-flex align-items-center justify-content-between">
      
      <a class="text-decoration-none d-flex align-items-center gap-2" href="{{ url_for('product.home') }}">
         <img src="{{ url_for('static', filename='logo-32.jpg') }}" alt="EasePharma" width="32" height="32">
         <h4 class="m-0 fw-bold" style="color: #008080;">EasePharma</h4>
      </a>

      <form action="{{ url_for('product.search') }}" method="get" class="d-flex w-50">
        <input name="q" class="form-control" style="border-radius: 20px 0 0 20px;" placeholder="Search for medicines..." value="{{ request.args.get('q','') }}">
        <button class="btn btn-primary" style="background-color: #008080; border: none; border-radius: 0 20px 20px 0;">
             <i class="fas fa-search"></i>
        </button>
      </form>

      <div>
        <a href="{{ url_for('product.cart_view') }}" class="text-dark text-decoration-none position-relative">
            <i class="fas fa-shopping-cart fa-lg"></i> 
            <span class="fw-bold ms-1">Cart</span>
            {% if session.get('cart') %}
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                {{ session.get('cart') | length }}
              </span>
            {% endif %}
        </a>
      </div>

    </div>
  </header>

  <div class="container my-4">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="alert alert-success alert-dismissible fade show" role="alert">
            {{ m }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
  
  <footer class="text-center py-4 text-muted small mt-auto border-top bg-white">
    &copy; 2025 EasePharma - Taking it Easy
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
