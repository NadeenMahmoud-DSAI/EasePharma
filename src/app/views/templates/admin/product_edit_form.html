{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Edit Product: {{ product.name }}</h1>
</div>

<div class="row">
    <div class="col-md-8">
        <form method="POST" action="{{ url_for('admin.edit_product', product_id=product.id) }}">
            
            <input type="hidden" name="id" value="{{ product.id }}">

            <div class="mb-3">
                <label class="form-label">Product Name (English)</label>
                <input type="text" name="name" class="form-control" required placeholder="e.g. Panadol Extra"
                       value="{{ product.name }}">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select">
                        <option value="Medicine" {{ 'selected' if product.category == 'Medicine' }}>Medicine</option>
                        <option value="Cosmetics" {{ 'selected' if product.category == 'Cosmetics' }}>Cosmetics</option>
                        <option value="Supplements" {{ 'selected' if product.category == 'Supplements' }}>Supplements</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Price ($)</label>
                    <input type="number" step="0.01" name="price" class="form-control" required
                           value="{{ product.price }}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Stock Quantity</label>
                <input type="number" name="stock" class="form-control" required
                       value="{{ product.stock }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Image URL (Optional)</label>
                <input type="text" name="image" class="form-control" placeholder="https://..."
                       value="{{ product.image }}">
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('admin.products') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
