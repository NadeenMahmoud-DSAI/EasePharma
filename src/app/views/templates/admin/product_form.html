{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width:900px; margin-top:30px;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Add Product</h2>
    <a class="btn btn-secondary" href="{{ url_for('admin.products') }}">Back</a>
  </div>

  <form action="{{ url_for('admin.add_product') }}" method="POST" novalidate>
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input class="form-control" name="name" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Category</label>
      <input class="form-control" name="category">
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Price</label>
        <input type="number" step="0.01" class="form-control" name="price" value="0.00">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Stock</label>
        <input type="number" class="form-control" name="stock" value="0">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Image URL</label>
      <input class="form-control" name="image" placeholder="https://...">
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Add Product</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('admin.products') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
